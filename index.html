<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVERSED BROS: GITHUB EDITION</title>
    <style>
        :root { --sky: #5c94fa; --brick: #914400; --grass: #48a048; --mario-red: #ff4545; }
        
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; height: 100vh; color: white; }

        /* WARNING SCREEN */
        #warning-screen {
            position: fixed; inset: 0; background: #000; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .warning-box { border: 5px solid red; padding: 20px; max-width: 400px; }
        .warning-box h2 { color: red; margin-top: 0; }
        
        #viewport {
            width: 100vw; height: 100vh; background: var(--sky);
            position: relative; overflow: hidden;
            transform: rotate(180deg); 
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes infiniteSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: infiniteSpin 1.5s linear infinite !important; }

        @keyframes flashSky {
            0% { background: #ff0000; } 20% { background: #00ff00; }
            40% { background: #0000ff; } 60% { background: #ffff00; }
            80% { background: #ff00ff; } 100% { background: #00ffff; }
        }
        .flashing { animation: flashSky 0.2s linear infinite !important; }

        #world { position: absolute; width: 5000px; height: 100%; }
        #player { width: 32px; height: 40px; position: absolute; z-index: 10; }
        #player-sprite { width: 100%; height: 100%; background: var(--mario-red); border: 3px solid #000; box-sizing: border-box; }

        .platform { position: absolute; background: var(--brick); border: 4px solid #4a2200; box-sizing: border-box; }
        .platform::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: var(--grass); }

        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.4); border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 10px; }

        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<audio id="chaos-audio" loop><source src="loud indian music Earrape.mp3" type="audio/mpeg"></audio>
<audio id="death-audio"><source src="Fork scratching a plate LOUD (reupload).mp3" type="audio/mpeg"></audio>

<div id="warning-screen">
    <div class="warning-box">
        <h2>⚠️ WARNING</h2>
        <p>This game contains <b>FLASHING LIGHTS</b>, <b>EXTREMELY LOUD NOISES</b>, and <b>FRUSTRATING CONTROLS</b>.</p>
        <p>Proceed at your own risk.</p>
        <button id="accept-warning" style="padding: 10px 20px; background: red; color: white; border: none; font-weight: bold; cursor: pointer;">I UNDERSTAND</button>
    </div>
</div>

<div id="start-screen" style="display:none;">
    <h1>REVERSED BROS</h1>
    <p>HOLD PHONE UPSIDE DOWN TO BEGIN</p>
    <button id="begin" style="padding: 15px 30px; cursor: pointer;">START GAME</button>
</div>

<div id="viewport">
    <div id="world">
        <div id="player"><div id="player-sprite"></div></div>
    </div>
</div>

<div class="controls">
    <div class="btn" id="btn-left">RIGHT</div>
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-right">LEFT</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const world = document.getElementById('world');
    const playerEl = document.getElementById('player');
    const audio = document.getElementById('chaos-audio');
    const deathAudio = document.getElementById('death-audio');
    const startBtn = document.getElementById('begin');
    const warningBtn = document.getElementById('accept-warning');

    let player = { x: 100, y: 300, w: 32, h: 40, vx: 0, vy: 0, isGrounded: false };
    let cheatTicks = 0;
    let isChaos = false;
    let currentJumpForce = -16;
    let jumpPending = false;

    // Warning bypass
    warningBtn.onclick = () => {
        document.getElementById('warning-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    };

    startBtn.onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => { if(res === 'granted') init(); });
        } else { init(); }
    };

    function init() {
        document.getElementById('start-screen').style.display = 'none';
        window.addEventListener('deviceorientation', handleOrientation);
        requestAnimationFrame(update);
    }

    function handleOrientation(e) {
        if (Math.abs(e.beta) < 60) {
            cheatTicks++;
            if (cheatTicks > 20 && !isChaos) startChaos();
        } else {
            cheatTicks = 0;
        }
    }

    function startChaos() {
        isChaos = true;
        audio.play().catch(e => {});
        viewport.style.transform = 'rotate(0deg)'; 
        viewport.classList.add('spinning', 'flashing');
    }

    function die() {
        deathAudio.currentTime = 0;
        deathAudio.play().catch(e => {});
        player.x = 100; player.y = 300; player.vy = 0; player.vx = 0;
    }

    const platforms = [{ x: 0, y: 0, w: 1000, h: 60 }, { x: 1100, y: 200, w: 200, h: 40 }, { x: 1400, y: 400, w: 200, h: 40 }];
    platforms.forEach(p => {
        const d = document.createElement('div');
        d.className = 'platform';
        Object.assign(d.style, { left: p.x+'px', bottom: p.y+'px', width: p.w+'px', height: p.h+'px' });
        world.appendChild(d);
    });

    const keys = {};
    function update() {
        let gravity = isChaos ? (0.8 + Math.random() * 0.5) : 0.8;
        let moveSpeed = isChaos ? 2.5 : 1.2;

        if (keys['leftBtn']) player.vx -= moveSpeed;
        if (keys['rightBtn']) player.vx += moveSpeed;
        
        if (keys['jumpBtn'] && player.isGrounded && !jumpPending) {
            jumpPending = true;
            const delay = Math.random() * (1000 - 300) + 300;
            setTimeout(() => {
                if (player.isGrounded) {
                    player.vy = currentJumpForce;
                    player.isGrounded = false;
                    currentJumpForce = -(Math.random() * (24 - 12) + 12);
                }
                jumpPending = false;
            }, delay);
        }

        player.vy += gravity;
        player.vx *= 0.85;
        player.x += player.vx;
        player.y -= player.vy;
        player.isGrounded = false;

        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                if (player.vy > 0 && (player.y + player.vy) >= (p.y + p.h - 15)) {
                    player.y = p.y + p.h; player.vy = 0; player.isGrounded = true;
                }
            }
        });

        if (isChaos) {
            playerEl.style.filter = `invert(${Math.random() > 0.9 ? 1 : 0}) hue-rotate(${Date.now() % 360}deg)`;
            playerEl.style.transform = `translate(${Math.random()*4}px, ${Math.random()*4}px)`;
        }

        world.style.transform = `translateX(${-(player.x - window.innerWidth / 2)}px)`;
        if (player.y < -400) die();

        playerEl.style.left = player.x + 'px';
        playerEl.style.bottom = player.y + 'px';
        requestAnimationFrame(update);
    }

    const setupBtn = (id, key) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
        el.ontouchend = () => keys[key] = false;
        el.onmousedown = () => keys[key] = true;
        el.onmouseup = () => keys[key] = false;
    };
    setupBtn('btn-left', 'leftBtn');
    setupBtn('btn-right', 'rightBtn');
    setupBtn('btn-jump', 'jumpBtn');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVERSED BROS: CHAOS EDITION</title>
    <style>
        :root { --sky: #5c94fa; --brick: #914400; --grass: #48a048; --mario-red: #ff4545; }
        
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; height: 100vh; display: flex; justify-content: center; align-items: center; }

        #viewport {
            width: 100vw; height: 100vh; background: var(--sky);
            position: relative; overflow: hidden;
            transform: rotate(180deg); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* The spinning animation for cheaters */
        @keyframes infiniteSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: infiniteSpin 2s linear infinite !important; }

        #world { position: absolute; width: 5000px; height: 100%; }
        #player { width: 32px; height: 40px; position: absolute; z-index: 10; transition: filter 0.2s; }
        #player-sprite { width: 100%; height: 100%; background: var(--mario-red); border: 3px solid #000; box-sizing: border-box; }

        .platform { position: absolute; background: var(--brick); border: 4px solid #4a2200; box-sizing: border-box; }
        
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; }

        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #warning-overlay { position: fixed; inset: 0; background: rgba(255,0,0,0.8); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transform: rotate(180deg); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>REVERSED BROS</h1>
    <p>HOLD PHONE UPSIDE DOWN</p>
    <button id="enable-sensor" style="padding: 15px 30px;">START ENGINE</button>
</div>

<div id="warning-overlay">
    <h1>⚠️ CHEAT DETECTED</h1>
    <p>ROTATE BACK NOW!</p>
</div>

<div id="viewport">
    <div id="world">
        <div id="player"><div id="player-sprite"></div></div>
    </div>
</div>

<div class="controls">
    <div class="btn" id="btn-left">RIGHT</div>
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-right">LEFT</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const world = document.getElementById('world');
    const playerEl = document.getElementById('player');
    const warning = document.getElementById('warning-overlay');
    const startBtn = document.getElementById('enable-sensor');

    let player = { x: 100, y: 300, w: 32, h: 40, vx: 0, vy: 0, isGrounded: false };
    let cheatTicks = 0; // Buffer for sensitivity
    let cheatCount = 0;
    let isChaos = false;
    let jumpForce = -16;

    // --- SENSOR SYSTEM (With Sensitivity Buffer) ---
    startBtn.onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') setupSensors(); });
        } else { setupSensors(); }
        document.getElementById('start-screen').style.display = 'none';
        gameLoop();
    };

    function setupSensors() {
        window.addEventListener('deviceorientation', (e) => {
            // Beta < 45 means phone is being held normally (cheating)
            if (Math.abs(e.beta) < 45) {
                cheatTicks++;
                // Only trigger if they hold it "normally" for more than 15 frames (~250ms)
                if (cheatTicks > 15 && warning.style.display !== 'flex') {
                    activateAntiCheat();
                }
            } else {
                cheatTicks = 0; // Reset if they rotate back quickly
            }
        });
    }

    function activateAntiCheat() {
        cheatCount++;
        warning.style.display = 'flex';
        viewport.style.transform = 'rotate(0deg)'; 

        if (cheatCount >= 2) {
            isChaos = true;
            viewport.classList.add('spinning');
        }

        setTimeout(() => {
            if (isChaos) {
                warning.innerHTML = "<h1>CHAOS ACTIVE</h1><p>PHYSICS CORRUPTED</p>";
            } else {
                warning.style.display = 'none';
                viewport.style.transform = 'rotate(180deg)';
            }
        }, 2000);
    }

    // Map/Platforms
    const platforms = [{x:0,y:0,w:1000,h:60},{x:1100,y:200,w:200,h:40},{x:1400,y:400,w:200,h:40}];
    platforms.forEach(p => {
        const d = document.createElement('div'); d.className = 'platform';
        Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:p.h+'px'});
        world.appendChild(d);
    });

    const keys = {};
    function gameLoop() {
        let speedMult = isChaos ? (Math.random() * 2) : 1;
        let gravity = isChaos ? (Math.sin(Date.now() / 500) * 0.5 + 0.8) : 0.8;

        if (keys['leftBtn']) player.vx -= (1.2 * speedMult);
        if (keys['rightBtn']) player.vx += (1.2 * speedMult);
        
        if (keys['jumpBtn'] && player.isGrounded) {
            player.vy = jumpForce;
            player.isGrounded = false;
            // Randomize next jump height
            jumpForce = -(Math.random() * 12 + 10); 
            if(isChaos) player.vx *= 5; // Chaos makes you zip sideways when jumping
        }

        player.vy += gravity;
        player.vx *= 0.85;
        player.x += player.vx;
        player.y -= player.vy;
        player.isGrounded = false;

        // Collision logic
        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                if (player.vy > 0) {
                    player.y = p.y + p.h; player.vy = 0; player.isGrounded = true;
                }
            }
        });

        // Chaos Visuals
        if (isChaos) {
            playerEl.style.filter = `hue-rotate(${Date.now() % 360}deg) blur(${Math.random() * 2}px)`;
        }

        // Camera & Reset
        world.style.transform = `translateX(${-(player.x - window.innerWidth/2)}px)`;
        if (player.y < -500) { player.x = 100; player.y = 300; player.vy = 0; }

        playerEl.style.left = player.x + 'px';
        playerEl.style.bottom = player.y + 'px';
        requestAnimationFrame(gameLoop);
    }

    const setKey = (id, k) => {
        const e = document.getElementById(id);
        e.ontouchstart = (ev) => { ev.preventDefault(); keys[k] = true; };
        e.ontouchend = () => keys[k] = false;
    };
    setKey('btn-left', 'leftBtn'); setKey('btn-right', 'rightBtn'); setKey('btn-jump', 'jumpBtn');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVERSED BROS: AUDIO FIXED</title>
    <style>
        :root { --sky: #5c94fa; --brick: #914400; --grass: #48a048; --mario-red: #ff4545; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; height: 100vh; }

        #viewport {
            width: 100vw; height: 100vh; background: var(--sky);
            position: relative; overflow: hidden;
            transform: rotate(180deg); 
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes skyFlash {
            0% { background: #ff0000; } 25% { background: #00ff00; }
            50% { background: #0000ff; } 75% { background: #ffff00; } 100% { background: #ff00ff; }
        }
        .flashing { animation: skyFlash 0.05s infinite !important; }
        .spinning { animation: infiniteSpin 1s linear infinite !important; }
        @keyframes infiniteSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #world { position: absolute; width: 5000px; height: 100%; }
        #player { width: 32px; height: 40px; position: absolute; z-index: 10; }
        #player-sprite { width: 100%; height: 100%; background: var(--mario-red); border: 3px solid #000; }

        .platform { position: absolute; background: var(--brick); border: 4px solid #4a2200; }
        
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.4); border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
    </style>
</head>
<body>

<audio id="chaos-music" loop>
    <source src="loud indian music Earrape.mp3" type="audio/mpeg">
</audio>

<div id="start-screen">
    <h1>REVERSED BROS</h1>
    <p>HOLD PHONE UPSIDE DOWN</p>
    <button id="begin" style="padding: 15px 30px; font-size: 20px;">START GAME</button>
</div>

<div id="viewport">
    <div id="world">
        <div id="player"><div id="player-sprite"></div></div>
    </div>
</div>

<div class="controls">
    <div class="btn" id="btn-left">RIGHT</div>
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-right">LEFT</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const world = document.getElementById('world');
    const playerEl = document.getElementById('player');
    const chaosAudio = document.getElementById('chaos-music');
    const startBtn = document.getElementById('begin');

    let player = { x: 100, y: 300, w: 32, h: 40, vx: 0, vy: 0, isGrounded: false };
    let cheatTicks = 0;
    let isChaos = false;
    let currentJumpForce = -16;
    let jumpPending = false;

    // --- INITIALIZATION ---
    startBtn.onclick = () => {
        // Prime the audio so the browser allows it to play later
        chaosAudio.play().then(() => {
            chaosAudio.pause(); // Pause immediately, wait for chaos or death
            chaosAudio.currentTime = 0;
        }).catch(e => console.log("Audio Init Error:", e));

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => { if(res === 'granted') run(); });
        } else { run(); }
    };

    function run() {
        document.getElementById('start-screen').style.display = 'none';
        window.addEventListener('deviceorientation', (e) => {
            if (Math.abs(e.beta) < 60) {
                cheatTicks++;
                if (cheatTicks > 20 && !isChaos) startChaos();
            } else { cheatTicks = 0; }
        });
        requestAnimationFrame(update);
    }

    function startChaos() {
        isChaos = true;
        viewport.style.transform = 'rotate(0deg)'; 
        viewport.classList.add('spinning', 'flashing');
        chaosAudio.volume = 1.0;
        chaosAudio.play(); // Start the permanent loop
    }

    // --- WORLD SETUP ---
    const platforms = [{ x: 0, y: 0, w: 1000, h: 60 }, { x: 1100, y: 200, w: 200, h: 40 }, { x: 1400, y: 400, w: 200, h: 40 }];
    platforms.forEach(p => {
        const d = document.createElement('div');
        d.className = 'platform';
        Object.assign(d.style, { left: p.x+'px', bottom: p.y+'px', width: p.w+'px', height: p.h+'px' });
        world.appendChild(d);
    });

    const keys = {};
    function update() {
        let gravity = isChaos ? (0.8 + Math.random() * 0.7) : 0.8;
        let moveSpeed = isChaos ? 2.8 : 1.2;

        if (keys['leftBtn']) player.vx -= moveSpeed;
        if (keys['rightBtn']) player.vx += moveSpeed;
        
        if (keys['jumpBtn'] && player.isGrounded && !jumpPending) {
            jumpPending = true;
            setTimeout(() => {
                if (player.isGrounded) {
                    player.vy = currentJumpForce;
                    player.isGrounded = false;
                    currentJumpForce = -(Math.random() * 12 + 13);
                }
                jumpPending = false;
            }, Math.random() * 700 + 300);
        }

        player.vy += gravity;
        player.vx *= 0.85;
        player.x += player.vx;
        player.y -= player.vy;
        player.isGrounded = false;

        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                if (player.vy > 0) { player.y = p.y + p.h; player.vy = 0; player.isGrounded = true; }
            }
        });

        if (isChaos) {
            playerEl.style.filter = `hue-rotate(${Date.now() % 360}deg) brightness(2)`;
        }

        world.style.transform = `translateX(${-(player.x - window.innerWidth / 2)}px)`;

        // DEATH LOGIC
        if (player.y < -500) {
            // Force play on death (resetting time to make it an earrape blast)
            chaosAudio.currentTime = 0; 
            chaosAudio.play(); 
            player.x = 100; player.y = 300; player.vy = 0;
        }

        playerEl.style.left = player.x + 'px';
        playerEl.style.bottom = player.y + 'px';
        requestAnimationFrame(update);
    }

    const setBtn = (id, k) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
        el.ontouchend = () => keys[k] = false;
    };
    setBtn('btn-left', 'leftBtn'); setBtn('btn-right', 'rightBtn'); setBtn('btn-jump', 'jumpBtn');
</script>
</body>
</html>

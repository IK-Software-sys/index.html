<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVERSED BROS: CHAOS EDITION</title>
    <style>
        :root { --sky: #5c94fa; --brick: #914400; --grass: #48a048; --mario-red: #ff4545; }
        
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; touch-action: none;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #viewport {
            width: 100vw; height: 100vh; background: var(--sky);
            position: relative; overflow: hidden;
            transform: rotate(180deg); transition: transform 0.3s ease;
        }

        @keyframes infiniteSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning { animation: infiniteSpin 2s linear infinite !important; }

        #world { position: absolute; width: 5000px; height: 100%; transition: filter 0.5s; }
        #player { width: 32px; height: 40px; position: absolute; z-index: 10; transition: width 0.2s, height 0.2s; }
        #player-sprite {
            width: 100%; height: 100%; background: var(--mario-red); border: 3px solid #000;
            box-sizing: border-box; box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2);
        }

        .platform { position: absolute; background: var(--brick); border: 4px solid #4a2200; box-sizing: border-box; }
        .platform::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: var(--grass); }

        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.4); border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #warning-overlay { position: fixed; inset: 0; background: rgba(255,0,0,0.8); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transform: rotate(180deg); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>REVERSED BROS</h1>
    <button id="enable-sensor" style="padding: 15px 30px; cursor: pointer;">START (HOLD REVERSED)</button>
</div>

<div id="warning-overlay">
    <h1 id="warning-title">⚠️ CHEAT DETECTED</h1>
    <p id="warning-msg">STOP ROTATING THE PHONE BACK.</p>
</div>

<div id="viewport">
    <div id="world">
        <div id="player"><div id="player-sprite"></div></div>
    </div>
</div>

<div class="controls">
    <div class="btn" id="btn-left">RIGHT</div>
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-right">LEFT</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const world = document.getElementById('world');
    const playerEl = document.getElementById('player');
    const warning = document.getElementById('warning-overlay');
    const startScreen = document.getElementById('start-screen');

    let player = { x: 100, y: 300, w: 32, h: 40, vx: 0, vy: 0, isGrounded: false };
    let cheatCount = 0;
    let isChaos = false;
    let gravity = 0.8;
    let currentJumpForce = -16;
    let moveSpeed = 1.2;

    document.getElementById('enable-sensor').onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => { if (state === 'granted') initSensors(); });
        } else { initSensors(); }
        startScreen.style.display = 'none';
        update(); 
    };

    function initSensors() {
        window.addEventListener('deviceorientation', (event) => {
            // Beta < 45 means the phone is being tilted toward a flat/normal position
            // High sensitivity fix: Only trigger if they stay there for a moment
            if (Math.abs(event.beta) < 45) {
                if (!isChaos && warning.style.display !== 'flex') handleCheat();
            }
        });
    }

    function handleCheat() {
        cheatCount++;
        warning.style.display = 'flex';
        viewport.style.transform = 'rotate(0deg)';

        if (cheatCount >= 2) {
            isChaos = true;
            viewport.classList.add('spinning');
            document.getElementById('warning-title').innerText = "SYSTEM CORRUPTED";
            document.getElementById('warning-msg').innerText = "CHAOS MODE PERMANENTLY ACTIVE";
            world.style.filter = "hue-rotate(90deg) invert(1)";
        }

        setTimeout(() => {
            if (cheatCount < 2) {
                warning.style.display = 'none';
                viewport.style.transform = 'rotate(180deg)';
            }
        }, 3000);
    }

    const platforms = [
        { x: 0, y: 0, w: 1000, h: 60 },
        { x: 1100, y: 200, w: 200, h: 40 },
        { x: 1400, y: 400, w: 200, h: 40 },
        { x: 1800, y: 0, w: 1200, h: 60 },
        { x: 3200, y: 300, w: 1000, h: 40 }
    ];

    platforms.forEach(p => {
        const div = document.createElement('div');
        div.className = 'platform';
        div.style.left = p.x + 'px'; div.style.bottom = p.y + 'px';
        div.style.width = p.w + 'px'; div.style.height = p.h + 'px';
        world.appendChild(div);
    });

    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        // CHAOS MECHANICS
        if (isChaos) {
            // Randomly flip gravity direction
            if (Math.random() > 0.99) gravity *= -1;
            // Randomize player size
            if (Math.random() > 0.98) {
                player.w = Math.random() * 60 + 10;
                playerEl.style.width = player.w + 'px';
            }
            moveSpeed = Math.random() * 3;
        }

        if (keys['leftBtn'] || keys['KeyD']) player.vx -= moveSpeed;
        if (keys['rightBtn'] || keys['KeyA']) player.vx += moveSpeed;
        
        if ((keys['jumpBtn'] || keys['Space']) && player.isGrounded) {
            player.vy = currentJumpForce;
            player.isGrounded = false;
            // Random Jump Altitude
            currentJumpForce = -(Math.random() * 15 + 10);
        }

        player.vy += gravity; 
        player.vx *= 0.85; 
        player.x += player.vx;
        player.y -= player.vy;
        player.isGrounded = false;

        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                
                // Ground detection (works for both gravity directions)
                if ((gravity > 0 && player.vy > 0) || (gravity < 0 && player.vy < 0)) {
                    player.y = (gravity > 0) ? p.y + p.h : p.y - player.h;
                    player.vy = 0;
                    player.isGrounded = true;
                } else {
                    player.vx *= -1.2;
                }
            }
        });

        let cameraX = player.x - (window.innerWidth / 2);
        world.style.transform = `translateX(${-cameraX}px)`;

        if (player.y < -500 || player.y > 1000) { player.x = 100; player.y = 300; player.vy = 0; }

        playerEl.style.left = player.x + 'px';
        playerEl.style.bottom = player.y + 'px';

        requestAnimationFrame(update);
    }

    const setupBtn = (id, key) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
        el.ontouchend = () => keys[key] = false;
    };
    setupBtn('btn-left', 'leftBtn');
    setupBtn('btn-right', 'rightBtn');
    setupBtn('btn-jump', 'jumpBtn');
</script>
</body>
</html>

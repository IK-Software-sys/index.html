<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVERSED BROS: ANTI-CHEAT</title>
    <style>
        :root { --sky: #5c94fa; --brick: #914400; --grass: #48a048; --mario-red: #ff4545; --mario-skin: #ffcc99; }
        
        /* Base Container */
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: 'Arial Black', sans-serif;
            touch-action: none;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        #viewport {
            width: 100vw; height: 100vh;
            background: var(--sky);
            position: relative;
            overflow: hidden;
            /* Initial State */
            transform: rotate(180deg);
            transition: transform 0.3s ease;
        }

        /* The spinning animation for cheaters */
        @keyframes infiniteSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning {
            animation: infiniteSpin 3s linear infinite !important;
        }

        #world {
            position: absolute; width: 5000px; height: 100%;
        }

        #player { width: 32px; height: 40px; position: absolute; z-index: 10; }
        #player-sprite {
            width: 100%; height: 100%; background: var(--mario-red); border: 3px solid #000;
            box-sizing: border-box;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2), 0px -10px 0 #000, 0px -15px 0 var(--mario-red);
        }
        #player-sprite::before {
            content: ''; position: absolute; top: 5px; left: 5px; 
            width: 15px; height: 10px; background: var(--mario-skin);
            border: 2px solid #000; box-shadow: 12px 2px 0 #000;
        }

        .platform {
            position: absolute; background: var(--brick);
            border: 4px solid #4a2200; box-sizing: border-box;
            box-shadow: 0 4px 0 #000; z-index: 5;
        }
        .platform::after {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 8px; background: var(--grass);
        }

        .controls {
            position: fixed; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            z-index: 100;
            /* Controls stay fixed relative to the user's hand */
        }

        .btn {
            width: 75px; height: 75px; background: rgba(255,255,255,0.4);
            border: 4px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 10px;
        }

        #warning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.8); color: white;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; z-index: 1000;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

<div id="warning-overlay">
    <h1>⚠️ CHEAT DETECTED</h1>
    <p>NICE TRY. STOP ROTATING THE PHONE.</p>
</div>

<div id="viewport">
    <div id="world">
        <div id="player"><div id="player-sprite"></div></div>
    </div>
</div>

<div class="controls">
    <div class="btn" id="btn-left">RIGHT</div>
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-right">LEFT</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const world = document.getElementById('world');
    const playerEl = document.getElementById('player');
    const warning = document.getElementById('warning-overlay');

    let player = { x: 100, y: 300, w: 32, h: 40, vx: 0, vy: 0, isGrounded: false };
    let cheatCount = 0;
    let isSpinning = false;

    // --- ACCELEROMETER / GYRO LOGIC ---
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (event) => {
            const gamma = event.gamma; // Left-to-right tilt
            const beta = event.beta;   // Front-to-back tilt

            // If phone is rotated roughly 180 degrees (upside down in hand)
            if (Math.abs(beta) > 130 || Math.abs(beta) < 50 && Math.abs(gamma) > 150) {
                if (!isSpinning) {
                    handleCheat();
                }
            }
        });
    }

    function handleCheat() {
        cheatCount++;
        warning.style.display = 'flex';
        
        // Flip the viewport again so it's STILL upside down for the cheater
        viewport.style.transform = 'rotate(0deg)'; 

        if (cheatCount > 2) {
            isSpinning = true;
            viewport.classList.add('spinning');
            warning.innerHTML = "<h1>CHAOS MODE ACTIVATED</h1><p>PLAYING FAIR WAS AN OPTION.</p>";
        }

        setTimeout(() => {
            if (!isSpinning) {
                warning.style.display = 'none';
                viewport.style.transform = 'rotate(180deg)';
            }
        }, 2000);
    }

    // --- MAP DATA ---
    const platforms = [
        { x: 0, y: 0, w: 1000, h: 60 },
        { x: 1100, y: 200, w: 200, h: 40 },
        { x: 1400, y: 400, w: 200, h: 40 },
        { x: 1800, y: 0, w: 1200, h: 60 },
        { x: 3200, y: 300, w: 1000, h: 40 }
    ];

    platforms.forEach(p => {
        const div = document.createElement('div');
        div.className = 'platform';
        div.style.left = p.x + 'px';
        div.style.bottom = p.y + 'px';
        div.style.width = p.w + 'px';
        div.style.height = p.h + 'px';
        world.appendChild(div);
    });

    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        if (keys['ArrowRight'] || keys['KeyD'] || keys['leftBtn']) player.vx -= 1.2;
        if (keys['ArrowLeft'] || keys['KeyA'] || keys['rightBtn']) player.vx += 1.2;
        if ((keys['Space'] || keys['ArrowUp'] || keys['jumpBtn']) && player.isGrounded) {
            player.vy = -16;
            player.isGrounded = false;
        }

        player.vy += 0.8; 
        player.vx *= 0.85; 
        player.x += player.vx;
        player.y -= player.vy;
        player.isGrounded = false;

        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                if (player.vy > 0 && (player.y + player.vy) >= (p.y + p.h - 15)) {
                    player.y = p.y + p.h;
                    player.vy = 0;
                    player.isGrounded = true;
                } else {
                    player.vx *= -1.5;
                }
            }
        });

        // Camera Follow
        let cameraX = player.x - (window.innerWidth / 2);
        world.style.transform = `translateX(${-cameraX}px)`;

        // Death/Reset
        if (player.y < -300) {
            player.x = 100; player.y = 300; player.vy = 0;
        }

        playerEl.style.left = player.x + 'px';
        playerEl.style.bottom = player.y + 'px';

        requestAnimationFrame(update);
    }

    const setupBtn = (id, key) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
        el.ontouchend = () => keys[key] = false;
    };
    setupBtn('btn-left', 'leftBtn');
    setupBtn('btn-right', 'rightBtn');
    setupBtn('btn-jump', 'jumpBtn');

    update();
</script>
</body>
</html>
